apiVersion: v1
kind: Service
metadata:
  name: server-webflux-k-service
  namespace: webflux
  labels:
    app: server-webflux-k
spec:
  selector:
    label.service: server-webflux-k
  ports:
    - port: 8081
      targetPort: sr-webflux-svc

---
apiVersion: v1
kind: Service
metadata:
  name: mysql-k-service
  namespace: webflux
  labels:
    app: mysql-k
spec:
  selector:
    label.service: mysql-k
  ports:
    - port: 3306
      targetPort: mysql-k-svc

---
apiVersion: v1
kind: Service
metadata:
  name: mongo-k-service
  namespace: webflux
  labels:
    app: mongo-k
spec:
  selector:
    label.service: mongo-k
  ports:
    - port: 27017
      targetPort: mongo-k-svc
