services:
  registry:
    image: registry:2
    ports:
      - "5000:5000"
    environment:
      REGISTRY_STORAGE_FILESYSTEM_ROOTDIRECTORY: /data
      REGISTRY_STORAGE_DELETE_ENABLED: "true"
    volumes:
      - ./data:/data
  sonarqube:
    image: sonarqube:lts-community
    depends_on:
      - sonar_db
    restart: always
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonar_db:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
    ports:
      - "9000:9000"
      - "9092:9092"
    volumes:
      - sonarqube_conf:/opt/sonarqube/conf
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_temp:/opt/sonarqube/temp
  sonar_db:
    image: postgres:17.2
    restart: always
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonar
    volumes:
      - sonar_db:/var/lib/postgresql
      - sonar_db_data:/var/lib/postgresql/data
  mysql:
    image: mysql:latest
    container_name: mysql_webflux
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: flux_db
      MYSQL_ROOT_HOST: '%'
    command: mysqld --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --default-time-zone=UTC
    ports:
      - '3306:3306'
    volumes:
      - mysql:/var/lib/mysql
    networks:
      - common-network
  mongo:
    image: mongo:latest
    container_name: mongo_webflux
    restart: always
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root
    networks:
      - common-network
  server_webflux:
    depends_on:
      - mongo
      - mysql
    container_name: server_webflux
    build:
      dockerfile: Dockerfile
    image: server_webflux:latest
    ports:
      - '8081:8081'
    environment:
      SPRING_PROFILES_ACTIVE: mysql, mongo, docker
    networks:
      - common-network
  flyway:
    image: webflux_flyway:latest
    build:
      dockerfile: flyway/Dockerfile_flyway
    container_name: webflux_flyway
    environment:
      FLYWAY_URL: jdbc:mysql://host.docker.internal:3306/flux_db?allowPublicKeyRetrieval=true
      FLYWAY_USER: root
      FLYWAY_PASSWORD: root
      FLYWAY_BASELINE_ON_MIGRATE: true
      FLYWAY_BASELINE_VERSION: 0
      FLYWAY_CONNECT_RETRIES: 30
    depends_on:
      - server_webflux
volumes:
  mysql:
    driver: local
  sonarqube_conf:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  sonarqube_temp:
  sonar_db:
  sonar_db_data:
networks:
  common-network:
    driver: bridge